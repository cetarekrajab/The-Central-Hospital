<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book an Appointment - The Central Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }
        main {
            padding-top: 80px; 
        }
        .div1 {
            background-color: rgb(255, 255, 255);
            width: 450px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            top: 0;
            left: 0;
            position: fixed;
            z-index: 10;
        }
        .head {
            margin: 0;
            font-family: 'Inter', sans-serif; 
            font-weight: 700; 
            font-size: 2em; 
        }
        .s1 {
            color: rgb(0, 200, 255);
        }
        .div2 {
            position: fixed;
            left: 450px;
            top: 0;
            right: 0;
            height: 80px;
            background-color: rgb(0, 200, 255);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            overflow-x: auto;
            z-index: 10;
        }
        .div2 button {
            border: 0;
            background-color: inherit;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 15px;
            white-space: nowrap;
            transition: background-color 0.2s;
            border-radius: 20px;
            font-family: 'Inter', sans-serif; 
        }
        .div2 button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .cta-button {
            background-color: white !important;
            color: rgb(0, 200, 255) !important;
            font-weight: bold;
        }
        .cta-button:hover {
            background-color: #f0f0f0 !important;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            width: 100%;
        }
        .time-button.selected {
            background-color: #2563eb; 
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body>
    <header>
        <div class="div1">
            <h1 class="head">The Central <span class="s1">Hospital</span></h1>
        </div>
        <div class="div2">
            <button type="button" onclick="location.href='Home.html'">Home</button>
           <button type="button" onclick="location.href='FindADoctor.html'">Find a Doctor</button>
           <button type="button" onclick="location.href='OurServices.html'">Our Services</button>
           <button type="button" onclick="location.href='AboutUs.html'">About Us</button>
           <button type="button" onclick="location.href='ContactUs.html'">Contact Us</button>
           <button type="button" class="cta-button" onclick="location.href='BookAnAppointment.html'">Book an Appointment</button>
        </div>
    </header>

    <main class="bg-gray-100 flex items-center justify-center min-h-screen p-4 sm:p-6">
        <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-4xl mx-auto">
            
            <div id="booking-calendar-step">
                <div class="text-center mb-8">
                    <h1 id="booking-title" class="text-3xl sm:text-4xl font-bold text-gray-800">Book an Appointment</h1>
                    <p class="text-lg text-gray-600 mt-2">Step 1: Select a Date</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse table-fixed">
                        <tbody id="appointment-grid">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="booking-time-step" class="hidden">
                <div class="text-center mb-8">
                    <h1 id="time-title" class="text-3xl sm:text-4xl font-bold text-gray-800">Step 2: Select a Time</h1>
                    <p class="text-lg text-gray-600 mt-2">Choose an available time slot.</p>
                </div>
                <div id="time-slot-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                </div>
                <button type="button" onclick="goBackToCalendar()" class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Go Back
                </button>
            </div>

            <div id="patient-form-step" class="hidden">
                <div class="text-center mb-8">
                    <h1 id="form-title" class="text-3xl sm:text-4xl font-bold text-gray-800">Step 3: Patient Details</h1>
                    <p class="text-lg text-gray-600 mt-2">Please fill in your details to confirm.</p>
                </div>
               <form id="details-form" method="post" action="book_appointment.php">
                    <div class="space-y-6">
                        <div>
                            <label for="patient-name" class="block text-sm font-medium text-gray-700">Patient's Full Name</label>
                            <input type="text" id="patient-name" name="patient-name" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3">
                        </div>
                        <div>
                            <label for="patient-phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                            <input type="tel" id="patient-phone" name="patient-phone" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3" placeholder="(123) 456-7890">
                        </div>
                        <div>
                            <label for="patient-email" class="block text-sm font-medium text-gray-700">Email Address</label>
                            <input type="email" id="patient-email" name="patient-email" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3" placeholder="you@example.com">
                        </div>
                        <div>
                            <label for="blood-type" class="block text-sm font-medium text-gray-700">Blood Type</label>
                            <select id="blood-type" name="blood-type" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3">
                                <option value="" disabled selected>Select blood type...</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div>
                            <label for="department" class="block text-sm font-medium text-gray-700">Department / Speciality</label>
                            <select id="department" name="department" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-3">
                                <option value="" disabled selected>Select a department...</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="General Medicine">General Medicine</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-4">
                            <button type="button" onclick="goBackToTime()" class="w-1/3 flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50">
                                Back
                            </button>
                            <button type="submit" id="continue-btn" class="w-2/3 flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                Confirm Appointment
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="booking-confirmation" class="hidden my-6 p-6 bg-blue-100 text-blue-800 border border-blue-300 rounded-lg text-center font-medium">
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2025 The Central <span class="s1">Hospital</span></p>
    </footer>

    <script>
        let selectedDate = '';
        let selectedDateCell = null;
        let selectedTime = '';
        let selectedTimeButton = null;
        let patientName = '';
        let department = '';
        let patientPhone = '';
        let patientEmail = '';
        let bloodType = '';

        let calendarStep, timeStep, formStep, confirmationStep, timeTitle, formTitle, timeSlotGrid, nameInput, departmentSelect, confirmationMessageEl, grid;
        let phoneInput, emailInput, bloodTypeSelect;

        document.addEventListener('DOMContentLoaded', () => {
            calendarStep = document.getElementById('booking-calendar-step');
            timeStep = document.getElementById('booking-time-step');
            formStep = document.getElementById('patient-form-step');
            confirmationStep = document.getElementById('booking-confirmation');
            timeTitle = document.getElementById('time-title');
            formTitle = document.getElementById('form-title');
            timeSlotGrid = document.getElementById('time-slot-grid');
            nameInput = document.getElementById('patient-name');
            departmentSelect = document.getElementById('department');
            phoneInput = document.getElementById('patient-phone');
            emailInput = document.getElementById('patient-email');
            bloodTypeSelect = document.getElementById('blood-type');
            confirmationMessageEl = document.getElementById('booking-confirmation');
            grid = document.getElementById('appointment-grid');
            const detailsForm = document.getElementById('details-form');

            detailsForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                patientName = nameInput.value;
                department = departmentSelect.value;
                patientPhone = phoneInput.value;
                patientEmail = emailInput.value;
                bloodType = bloodTypeSelect.value;

                if (!patientName || !department || !selectedDate || !selectedTime || !patientPhone || !patientEmail || !bloodType) {
                    alert('Please fill out all fields and select a date/time.');
                    return;
                }

                const urlEncodedData = new URLSearchParams();
                urlEncodedData.append('patient-name', patientName);
                urlEncodedData.append('patient-phone', patientPhone);
                urlEncodedData.append('patient-email', patientEmail);
                urlEncodedData.append('blood-type', bloodType);
                urlEncodedData.append('department', department);
                urlEncodedData.append('appointment_date', selectedDate);
                urlEncodedData.append('appointment_time', selectedTime);

                fetch('book_appointment.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: urlEncodedData
                })
                .then(response => response.text())
                .then(data => {
                    if (data.trim() === 'Appointment booked successfully!') {
                        confirmationMessageEl.innerHTML = `
                            <h4 class="text-xl font-bold mb-4">Appointment Confirmed!</h4>
                            <div class="text-left w-full max-w-md mx-auto">
                                <p class="mb-1"><strong>Patient:</strong> ${patientName}</p>
                                <p class="mb-1"><strong>Department:</strong> ${department}</p>
                                <p class="mb-1"><strong>Date:</strong> ${selectedDate}</p>
                                <p class="mb-1"><strong>Time:</strong> ${selectedTime}</p>
                                <p class="mb-1"><strong>Phone:</strong> ${patientPhone}</p>
                                <p class="mb-1"><strong>Email:</strong> ${patientEmail}</p>
                                <p class="mb-1"><strong>Blood Type:</strong> ${bloodType}</p>
                            </div>
                            <p class="text-center mt-4 text-sm">A confirmation will be sent shortly.</p>
                        `;
                        showStep('confirmation');
                        saveBooking(selectedDate, selectedTime);
                    } else {
                        alert('Error booking appointment: ' + data);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('A connection error occurred.');
                });
            });

            buildCalendarGrid();
        });

        function showStep(stepName) {
            calendarStep.classList.add('hidden');
            timeStep.classList.add('hidden');
            formStep.classList.add('hidden');
            confirmationStep.classList.add('hidden');
            if (stepName === 'calendar') {
                calendarStep.classList.remove('hidden');
            } else if (stepName === 'time') {
                timeStep.classList.remove('hidden');
            } else if (stepName === 'form') {
                formStep.classList.remove('hidden');
            } else if (stepName === 'confirmation') {
                confirmationStep.classList.remove('hidden');
            }
        }

        function getAvailableSlots(date) {
            const allTimes = ["10:00 AM", "11:00 AM", "12:00 PM", "1:00 PM", "2:00 PM", "3:00 PM", "4:00 PM"];
            const bookings = loadBookings();
            const reservedTimes = bookings[date] || [];
            return allTimes.filter(time => !reservedTimes.includes(time));
        }

        function buildCalendarGrid() {
            const today = new Date();
            let dateCounter = 0;
            const totalCells = 20;
            const validDays = 14;
            const options = { month: 'long', day: 'numeric' };
            grid.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                const row = grid.insertRow();
                for (let c = 0; c < 5; c++) {
                    if (dateCounter >= totalCells) break;
                    const cell = row.insertCell();
                    const cellDate = new Date();
                    cellDate.setDate(today.getDate() + dateCounter);
                    const formattedDate = cellDate.toLocaleDateString('en-US', options);
                    cell.dataset.date = formattedDate;
                    const availableSlots = getAvailableSlots(formattedDate);

                    if (dateCounter > 0 && dateCounter <= validDays) {
                        if (availableSlots.length > 0) {
                            cell.className = 'border border-gray-300 h-20 sm:h-24 p-2 align-middle text-center bg-green-50 cursor-pointer transition-all duration-300 hover:bg-green-200';
                            cell.innerHTML = `<span class="text-base sm:text-lg font-semibold text-gray-800">${formattedDate}</span>`;
                            cell.onclick = (e) => selectDate(e.currentTarget, formattedDate);
                        } else {
                             cell.className = 'border border-gray-300 h-20 sm:h-24 p-2 align-middle text-center bg-gray-200 text-gray-500 cursor-not-allowed';
                             cell.innerHTML = `<span class="text-base sm:text-lg font-semibold">${formattedDate}</span>`;
                        }
                    } else {
                        cell.className = 'border border-gray-300 h-20 sm:h-24 p-2 align-middle text-center bg-gray-100 text-gray-400';
                        cell.innerHTML = `<span class="text-base sm:text-lg font-semibold line-through">${formattedDate}</span>`;
                    }
                    dateCounter++;
                }
            }
        }

        function selectDate(cell, date) {
            if (selectedDateCell && selectedDateCell !== cell) {
                selectedDateCell.classList.remove('bg-green-400', 'text-white');
                selectedDateCell.classList.add('bg-green-50', 'hover:bg-green-200');
            }
            selectedDate = date;
            selectedDateCell = cell;
            cell.classList.add('bg-green-400', 'text-white');
            cell.classList.remove('bg-green-50', 'hover:bg-green-200');
            timeTitle.textContent = `Step 2: Select a Time for ${date}`;
            buildTimeSlotsForDate(date);
            showStep('time');
        }

        function buildTimeSlotsForDate(date) {
            const allTimes = ["10:00 AM", "11:00 AM", "12:00 PM", "1:00 PM", "2:00 PM", "3:00 PM", "4:00 PM"];
            const availableTimes = getAvailableSlots(date);
            timeSlotGrid.innerHTML = '';
            
            allTimes.forEach(time => {
                const button = document.createElement('button');
                button.type = 'button';
                button.textContent = time;
                button.className = 'time-button p-4 border border-gray-300 rounded-lg text-lg font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 transition-all';
                button.dataset.time = time;
                if (!availableTimes.includes(time)) {
                    button.textContent = 'Reserved';
                    button.disabled = true;
                    button.className = 'p-4 border border-gray-300 rounded-lg text-lg font-medium text-gray-500 bg-gray-200 cursor-not-allowed opacity-80';
                } else {
                    button.onclick = (e) => selectTime(e.currentTarget, time);
                }
                timeSlotGrid.appendChild(button);
            });
        }

        function selectTime(button, time) {
            if (selectedTimeButton && selectedTimeButton !== button) {
                selectedTimeButton.classList.remove('selected');
            }
            selectedTime = time;
            selectedTimeButton = button;
            button.classList.add('selected');
            formTitle.textContent = `Step 3: Details for ${selectedTime}`;
            showStep('form');
        }

        function goBackToCalendar() {
            showStep('calendar');
        }

        function goBackToTime() {
            if (selectedTimeButton) {
                selectedTimeButton.classList.remove('selected');
            }
            selectedTime = '';
            selectedTimeButton = null;
            showStep('time');
        }

        function loadBookings() {
            const raw = localStorage.getItem('bookedAppointments');
            try {
                return raw ? JSON.parse(raw) : {};
            } catch (e) {
                return {};
            }
        }

        function saveBooking(date, time) {
            const bookings = loadBookings();
            if (!bookings[date]) bookings[date] = [];
            if (!bookings[date].includes(time)) bookings[date].push(time);
            localStorage.setItem('bookedAppointments', JSON.stringify(bookings));
            buildTimeSlotsForDate(date);
        }
    </script>
</body>
</html>
